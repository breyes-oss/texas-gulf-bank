story_headline_accent: "Texas Banking"
story_body_1: "Texas Gulf Bank is an independently owned and operated community bank with locations in Harris, Galveston, and Brazoria counties. For over 100 years, we've been a strong and financially secure member of the Texas Gulf Coast community."
story_body_2: "We pride ourselves on personal relationships — you'll always speak face-to-face with a local decision-maker. Our team members live and work in the same communities where our branches are located."
