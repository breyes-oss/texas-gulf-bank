backend:
  name: github
  repo: breyes-oss/texas-gulf-bank
  branch: main
  base_url: https://tgbtest2.pages.dev
  auth_endpoint: /api/auth
  site_domain: tgbtest2.pages.dev

media_folder: public/blog
public_folder: /blog
publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "src/content/blog"
    create: true
    delete: true
    preview_path: "blog/{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "MMMM D, YYYY" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Category", name: "category", widget: "select", options: ["Business", "Community", "Security", "Personal"] }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    folder: "src/content/pages"
    create: true
    delete: false
    extension: yaml
    format: yaml
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Hero Headline", name: "hero_headline", widget: "string", required: false }
      - { label: "Hero Subtext", name: "hero_subtext", widget: "text", required: false }
      - { label: "Feature Cards Headline", name: "features_headline", widget: "string", required: false }
